name: Sync latest releases & update README

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sync-releases
  cancel-in-progress: false

jobs:
  sync-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq wget bc

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cleanup orphaned repos and mismatched assets
        run: |
          if [ ! -f repos.txt ]; then
            echo "No repos.txt found, skipping cleanup"
            exit 0
          fi
          
          declare -A EXPECTED_REPOS=()
          declare -A FILTERS=()
          
          while IFS='|' read -r repo_path filter_pattern; do
            repo_path="${repo_path//[[:space:]]/}"
            if [[ -n "$repo_path" && ! "$repo_path" =~ ^# ]]; then
              EXPECTED_REPOS["$repo_path"]=1
              FILTERS["$repo_path"]="${filter_pattern//[[:space:]]/}"
            fi
          done < repos.txt

          if [ -d releases ]; then
            find releases -type f -name ".version" -exec dirname {} \; | sort -u | while read -r repo_dir; do
              parent=$(basename "$(dirname "$repo_dir")")
              repo=$(basename "$repo_dir")
              full_repo="$parent/$repo"
              if [ -z "${EXPECTED_REPOS[$full_repo]:-}" ]; then
                echo "Removing orphaned: releases/$parent/$repo"
                git rm -rf "$repo_dir" || true
              fi
            done
          fi

          for full_repo in "${!EXPECTED_REPOS[@]}"; do
            IFS='/' read -r owner repo <<< "$full_repo"
            repo_dir="releases/$owner/$repo"
            [[ -d "$repo_dir" ]] || continue
            current_filter="${FILTERS[$full_repo]:-}"
            [[ -z "$current_filter" ]] && continue
            
            find "$repo_dir" -maxdepth 1 -type f ! -name ".version" ! -name "release.json" ! -name ".filter" | while read -r asset_path; do
              asset=$(basename "$asset_path")
              if ! echo "$asset" | grep -qiE "$current_filter"; then
                echo "Deleting mismatched: $asset_path"
                git rm "$asset_path" || true
              fi
            done
          done

          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Cleanup: remove orphaned repos and mismatched assets"
            git push || true
          fi

      - name: Sync releases
        run: |
          git pull origin main || git pull origin master || true

          if [ ! -f repos.txt ]; then
            echo "::warning:: repos.txt not found"
            exit 0
          fi

          mapfile -t lines < <(grep -v '^#' repos.txt | grep -v '^[[:space:]]*$')
          for line in "${lines[@]}"; do
            IFS='|' read -r repo_path filter_pattern <<< "$line"
            repo_path="${repo_path//[[:space:]]/}"
            filter_pattern="${filter_pattern//[[:space:]]/}"
            
            [[ -z "$repo_path" || "$repo_path" =~ ^# || -z "$filter_pattern" ]] && continue

            echo "========================================="
            echo "Processing: $repo_path"
            echo "Filter: $filter_pattern"

            IFS='/' read -r owner repo_name <<< "$repo_path"
            target_dir="releases/$owner/$repo_name"
            mkdir -p "$target_dir"

            latest_json=$(curl -s -f -L -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$repo_path/releases/latest" || echo '{"message":"Not Found"}')

            if echo "$latest_json" | grep -q '"message"'; then
              echo "No releases found"
              continue
            fi

            tag=$(echo "$latest_json" | jq -r '.tag_name // empty')
            [[ -z "$tag" ]] && { echo "No valid tag"; continue; }

            prerelease=$(echo "$latest_json" | jq -r '.prerelease // false')
            date_raw=$(echo "$latest_json" | jq -r '.published_at // ""')

            current_version=$(cat "$target_dir/.version" 2>/dev/null || echo "")
            stored_filter=$(cat "$target_dir/.filter" 2>/dev/null || echo "")

            if [[ "$current_version" != "$tag" || "$stored_filter" != "$filter_pattern" ]]; then
              echo "Updating to $tag"
              
              # Clean old assets
              rm -f "$target_dir"/* || true
              mkdir -p "$target_dir"

              # Get asset URLs
              asset_urls=$(curl -s -f -L "https://api.github.com/repos/$repo_path/releases/tags/$tag" \
                | jq -r --arg pat "$filter_pattern" '.assets[]? | .browser_download_url | select(test($pat;"i")) // empty')

              echo "$asset_urls" | grep -v '^$' | while read -r url; do
                [[ -z "$url" ]] && continue
                filename=$(basename "$url")
                echo "Downloading: $filename"
                
                if wget --timeout=60 --tries=3 -q "$url" -O "$target_dir/$filename"; then
                  file_size=$(stat -c%s "$target_dir/$filename" 2>/dev/null || echo 0)
                  if [[ "$file_size" -gt 104857600 ]]; then
                    cd "$target_dir"
                    split -b 90m -d -a 3 "$filename" "${filename}."
                    files=( "${filename}."* )
                    for i in "${!files[@]}"; do
                      new_name="${filename}.$((i+1))"
                      [[ "${files[i]}" != "$new_name" ]] && mv "${files[i]}" "$new_name"
                    done
                    rm -f "$filename"
                    cd -
                  fi
                fi
              done

              echo "$tag" > "$target_dir/.version"
              echo "$filter_pattern" > "$target_dir/.filter"

              jq -n \
                --arg tag "$tag" \
                --arg status $([[ "$prerelease" == "true" ]] && echo "prerelease" || echo "stable") \
                --arg published_at "$date_raw" \
                --arg filter "$filter_pattern" \
                --arg updated "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                '{tag:$tag,status:$status,published_at:$published_at,filter_pattern:$filter,updated_at:$updated}' \
                > "$target_dir/release.json"

              git add "$target_dir"
              git commit -m "chore: update $repo_path to $tag" || true
            else
              echo "Up to date: $tag"
            fi
          done

          git push || true

      - name: Update README
        run: |
          # Simplified README update logic
          if [ ! -f README.md ]; then
            touch README.md
            echo "<!-- RELEASES_START -->" >> README.md
            echo "<!-- RELEASES_END -->" >> README.md
          fi

          # Generate table (simplified)
          if [ -d releases ]; then
            find releases -name ".version" -type f | sort | while read -r version_file; do
              repo_dir=$(dirname "$version_file")
              owner=$(basename "$(dirname "$repo_dir")")
              repo=$(basename "$repo_dir")
              tag=$(cat "$version_file")
              echo "### $owner/$repo v$tag" >> README.md
            done
          fi

          git add README.md
          git commit -m "docs: update README" || true
          git push || true
